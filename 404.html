<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Veloce Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <a href="index.html" class="logo">
        Veloce<span class="logo-dot"></span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="categories.html">Categories</a>
      </nav>
      <div class="header-actions">
        <button id="theme-toggle" class="action-btn"></button>
      </div>
    </div>
  </header>

  <!-- 404 Main Wrapper -->
  <section class="section-padding" style="display:flex; align-items:center; justify-content:center; min-height:75vh;">
    <div class="glass-card" style="padding:4rem; text-align:center; max-width:550px; width:90%; border-radius:var(--border-radius-lg);">
      <span style="font-size:6rem; font-weight:800; color:var(--primary-color); display:block; line-height:1; margin-bottom:1.5rem;">404</span>
      <h1 style="font-size:2.2rem; margin-bottom:1rem;">Page Not Found</h1>
      <p style="color:var(--text-secondary); margin-bottom:2.5rem; font-size:1.05rem;">The catalog item or page you are requesting could not be located. It may have been moved or renamed.</p>
      
      <div style="display:flex; gap:1rem; justify-content:center;">
        <a href="index.html" class="btn btn-primary">Go to Homepage</a>
        <a href="shop.html" class="btn btn-secondary">Search Products</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container footer-bottom" style="text-align:center; justify-content:center;">
      <span>&copy; 2026 Veloce Inc. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
