<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | Veloce Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <a href="index.html" class="logo">
        Veloce<span class="logo-dot"></span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="categories.html">Categories</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <button id="theme-toggle" class="action-btn"></button>
        <a href="wishlist.html" class="action-btn">
          <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
          <span class="badge wishlist-count-badge">0</span>
        </a>
        <a href="cart.html" class="action-btn">
          <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 20 20"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 100-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
          <span class="badge cart-count-badge">0</span>
        </a>
        <a href="login.html" id="auth-nav-user" class="action-btn">
          <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        </a>
        <button class="menu-toggle" id="menu-toggle">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Checkout Section -->
  <section class="section-padding">
    <div class="container">
      <h1 style="font-size:2.2rem; margin-bottom:2.5rem;">Secure Checkout</h1>

      <form id="checkout-form" style="display:grid; grid-template-columns: 1.8fr 1.2fr; gap:3rem; align-items:start;">
        
        <!-- Shipping & Payment columns -->
        <div style="display:flex; flex-direction:column; gap:2rem;">
          
          <!-- Shipping Address block -->
          <div class="glass-card" style="padding:2.5rem;">
            <h2 style="font-size:1.4rem; margin-bottom:1.5rem;">1. Shipping Details</h2>
            <div style="display:flex; flex-direction:column; gap:1.2rem;">
              <div>
                <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">Full Name</label>
                <input type="text" id="checkout-fullname" required placeholder="John Doe" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
              </div>
              <div>
                <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">Email Address</label>
                <input type="email" id="checkout-email" required placeholder="john@doe.com" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
              </div>
              <div>
                <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">Street Address</label>
                <input type="text" id="checkout-address" required placeholder="123 Luxury Ave" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
              </div>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                <div>
                  <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">City</label>
                  <input type="text" id="checkout-city" required placeholder="New York" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
                </div>
                <div>
                  <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">ZIP Code</label>
                  <input type="text" id="checkout-zip" required placeholder="10001" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
                </div>
              </div>
            </div>
          </div>

          <!-- Payment methods block -->
          <div class="glass-card" style="padding:2.5rem;">
            <h2 style="font-size:1.4rem; margin-bottom:1.5rem;">2. Payment Method</h2>
            
            <div style="display:flex; flex-direction:column; gap:1rem; margin-bottom:2rem;">
              <label style="display:flex; align-items:center; gap:0.8rem; cursor:pointer; font-weight:600;">
                <input type="radio" name="payment" value="card" checked style="width:18px; height:18px;" onclick="document.getElementById('card-info-fields').style.display='flex'"> Credit / Debit Card
              </label>
              <label style="display:flex; align-items:center; gap:0.8rem; cursor:pointer; font-weight:600;">
                <input type="radio" name="payment" value="paypal" style="width:18px; height:18px;" onclick="document.getElementById('card-info-fields').style.display='none'"> PayPal Checkout (Simulated)
              </label>
            </div>

            <!-- Card inputs -->
            <div id="card-info-fields" style="display:flex; flex-direction:column; gap:1.2rem;">
              <div>
                <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">Card Number</label>
                <input type="text" id="checkout-cardnumber" placeholder="4111 2222 3333 4444" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
              </div>
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                <div>
                  <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">Expiry Date</label>
                  <input type="text" id="checkout-expiry" placeholder="MM/YY" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
                </div>
                <div>
                  <label style="font-size:0.85rem; font-weight:600; display:block; margin-bottom:0.5rem;">CVC / CVV</label>
                  <input type="password" id="checkout-cvc" placeholder="•••" style="width:100%; padding:0.75rem 1rem; border-radius:var(--border-radius-sm); border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
                </div>
              </div>
            </div>

          </div>

        </div>

        <!-- Checkout summary sidebar -->
        <div class="glass-card" style="padding:2rem;">
          <h3 style="margin-bottom:1.5rem; font-size:1.3rem;">Summary Order</h3>
          
          <div id="checkout-items-list">
            <!-- Populated via checkout.js -->
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; margin-top:2rem; padding:1rem;">Place Order Now</button>
        </div>

      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container footer-top">
      <div class="footer-brand">
        <a href="index.html" class="logo">Veloce<span class="logo-dot"></span></a>
      </div>
    </div>
    <div class="container footer-bottom">
      <span>&copy; 2026 Veloce Inc. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
