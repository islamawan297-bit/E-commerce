<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed Successfully | Veloce Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <a href="index.html" class="logo">
        Veloce<span class="logo-dot"></span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="categories.html">Categories</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <button id="theme-toggle" class="action-btn"></button>
        <a href="wishlist.html" class="action-btn">
          <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
          <span class="badge wishlist-count-badge">0</span>
        </a>
        <a href="cart.html" class="action-btn">
          <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 20 20"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 100-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg>
          <span class="badge cart-count-badge">0</span>
        </a>
        <a href="login.html" id="auth-nav-user" class="action-btn">
          <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Success content block -->
  <section class="section-padding" style="display:flex; align-items:center; justify-content:center; min-height:75vh;">
    <div class="glass-card" style="padding:4rem; text-align:center; max-width:600px; width:90%; border-radius:var(--border-radius-lg);">
      
      <div style="width:70px; height:70px; border-radius:50%; background:#d1fae5; color:#059669; display:flex; align-items:center; justify-content:center; margin:0 auto 2rem;">
        <svg style="width:36px; height:36px; fill:currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
      </div>

      <h1 style="font-size:2.4rem; margin-bottom:1rem;">Order Placed Successfully!</h1>
      <p style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:1.05rem;">Thank you for your purchase. We are processing your delivery details.</p>
      
      <div class="glass-card" style="padding:1rem; border-color:var(--border-color); background:var(--bg-tertiary); display:inline-block; font-weight:700; margin-bottom:2.5rem; font-size:1.1rem;">
        Order ID: <span id="success-order-id" style="color:var(--primary-color);">#------</span>
      </div>

      <div style="display:flex; gap:1rem; justify-content:center;">
        <a href="profile.html" class="btn btn-primary">View Order Status</a>
        <a href="shop.html" class="btn btn-secondary">Continue Shopping</a>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container footer-bottom" style="text-align:center; justify-content:center;">
      <span>&copy; 2026 Veloce Inc. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("orderId");
      if (orderId) {
        document.getElementById("success-order-id").textContent = `#${orderId}`;
      }
    });
  </script>
</body>
</html>
